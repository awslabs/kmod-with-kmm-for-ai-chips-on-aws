name: ASH SAST Scan

on:
  pull_request:
    branches: [ main ]

env:
  ASH_OUTPUT_PATH: .ash/ash_output

permissions:
  contents: read

jobs:
  ash-scan:
    name: Run ASH Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      # Third-party tool: Automated Security Helper (ASH) from awslabs
      # Used for security scanning to detect secrets and configuration issues
      - name: Install ASH
        run: pip install git+https://github.com/awslabs/automated-security-helper.git@v3.3.0
      - name: Run ASH scan
        run: ash --mode local
      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ash-results
          path: ${{ env.ASH_OUTPUT_PATH }}
          include-hidden-files: true
