# Keeps GitHub Actions pinned to commit SHAs up to date.
# Actions are pinned to immutable commit SHAs (see .github/workflows/*.yml)
# to satisfy supply-chain hardening; Dependabot bumps the SHA and updates
# the trailing "# vX" comment when new releases are published.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
